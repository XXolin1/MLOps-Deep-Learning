version: "3.9"

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./.cache:/app/.cache:ro
    environment:
      - MODEL_CACHE=/app/.cache/model
      - DATA_CACHE=/app/.cache/data
      - API_HOST=0.0.0.0
      - API_PORT=8000
    command: bash run_API.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
